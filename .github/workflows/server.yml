name: Server

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: alpine
    container: pretendonetwork/yo-kai-watch-blasters:sha-90c3511
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
      - name: ls
        run: ls "/home/go/app/"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
    
